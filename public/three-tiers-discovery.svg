<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse"><path d="M2 2 L8 4.5 L2 7 Z" fill="#9a9aa8"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse"><path d="M2 2 L8 4.5 L2 7 Z" fill="#e9c46a"/></marker>
  </defs>

  <rect x="0.5" y="0.5" width="999" height="599" rx="8" fill="#0d0d12" stroke="#1e1e26"/>

  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8f0">How the three tiers build an evolving discovery</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" font-style="italic" fill="#9a9aa8" font-family="Georgia,'Times New Roman',serif">A claim is proposed, tested under the rules, and what the evidence supports becomes the ground for the next, deeper claim.</text>

  <g font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#9a9aa8" text-anchor="middle">
    <text x="235" y="96">SUPPORTED</text>
    <text x="451" y="88">BEING ESTABLISHED</text>
    <text x="451" y="102" fill="#e63946">YOU ARE HERE</text>
    <text x="667" y="96">PROPOSED</text>
    <text x="883" y="96">THE OPEN QUESTION</text>
  </g>

  <text x="15" y="156" font-size="13" font-weight="700" fill="#e63946">ONTOLOGICAL</text>
  <text x="15" y="172" font-size="10.5" fill="#9a9aa8">proposes truth claims</text>
  <text x="15" y="284" font-size="13" font-weight="700" fill="#2ec4b6">EMPIRICAL</text>
  <text x="15" y="300" font-size="10.5" fill="#9a9aa8">tests them</text>

  <g fill="#e63946" fill-opacity="0.06" stroke="#e63946" stroke-opacity="0.5">
    <rect x="135" y="112" width="200" height="100" rx="5"/>
    <rect x="351" y="112" width="200" height="100" rx="5"/>
    <rect x="567" y="112" width="200" height="100" rx="5"/>
    <rect x="783" y="112" width="200" height="100" rx="5"/>
  </g>
  <g font-size="12" fill="#e8e8f0">
    <text x="146" y="134">Intelligence is not tied<tspan x="146" dy="16">to one physical medium.</tspan></text>
    <text x="362" y="134">Intelligence, cognition<tspan x="362" dy="16">and consciousness are</tspan><tspan x="362" dy="16">three different things.</tspan></text>
    <text x="578" y="134">The same intelligence<tspan x="578" dy="16">shows up across many</tspan><tspan x="578" dy="16">independent measures.</tspan></text>
    <text x="794" y="134">Such intelligence can<tspan x="794" dy="16">act on its own, as an</tspan><tspan x="794" dy="16">agent.</tspan></text>
  </g>

  <g stroke="#9a9aa8" stroke-width="1.4">
    <line x1="235" y1="216" x2="235" y2="234" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <line x1="451" y1="216" x2="451" y2="234" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <line x1="667" y1="216" x2="667" y2="234" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <line x1="883" y1="216" x2="883" y2="234" marker-start="url(#ar)" marker-end="url(#ar)"/>
  </g>

  <g fill="#2ec4b6" fill-opacity="0.06" stroke="#2ec4b6" stroke-opacity="0.5">
    <rect x="135" y="240" width="200" height="100" rx="5"/>
    <rect x="351" y="240" width="200" height="100" rx="5"/>
    <rect x="567" y="240" width="200" height="100" rx="5"/>
    <rect x="783" y="240" width="200" height="100" rx="5"/>
  </g>
  <g font-size="12" fill="#e8e8f0">
    <text x="146" y="262">Train identical models<tspan x="146" dy="16">on different languages;</tspan><tspan x="146" dy="16">compare what they learn.</tspan></text>
    <text x="362" y="262">Separate the three; show<tspan x="362" dy="16">consciousness narrates</tspan><tspan x="362" dy="16">but does not do the</tspan><tspan x="362" dy="16">thinking.</tspan></text>
    <text x="578" y="262">Many unrelated<tspan x="578" dy="16">experiments; see whether</tspan><tspan x="578" dy="16">they point the same way.</tspan></text>
    <text x="794" y="262">Define agency so it can<tspan x="794" dy="16">fail the test; look for</tspan><tspan x="794" dy="16">it across substrates.</tspan></text>
  </g>

  <g stroke="#e9c46a" stroke-width="1.4" stroke-dasharray="2 2">
    <line x1="235" y1="344" x2="235" y2="362" marker-start="url(#ag)" marker-end="url(#ag)"/>
    <line x1="451" y1="344" x2="451" y2="362" marker-start="url(#ag)" marker-end="url(#ag)"/>
    <line x1="667" y1="344" x2="667" y2="362" marker-start="url(#ag)" marker-end="url(#ag)"/>
    <line x1="883" y1="344" x2="883" y2="362" marker-start="url(#ag)" marker-end="url(#ag)"/>
  </g>

  <rect x="15" y="368" width="968" height="76" rx="5" fill="#e9c46a" fill-opacity="0.07" stroke="#e9c46a" stroke-opacity="0.7"/>
  <text x="33" y="392" font-size="12" font-weight="700" fill="#e9c46a">EPISTEMOLOGICAL</text>
  <text x="33" y="414" font-size="12.5" fill="#e8e8f0">The rules: what would count as support, and where each instrument's reach ends. It governs<tspan x="33" dy="18">every stage, and grows as the experiments map its edges.</tspan></text>

  <line x1="15" y1="470" x2="33" y2="470" stroke="#9a9aa8" stroke-width="1.6"/>
  <text x="40" y="474" font-size="11" fill="#9a9aa8">Solid two-way arrows, mutual support: a claim is sent down to be tested, and the evidence<tspan x="40" dy="16">travels back up to support it or send it back for revision.</tspan></text>
  <line x1="15" y1="510" x2="33" y2="510" stroke="#e9c46a" stroke-width="1.6" stroke-dasharray="2 2"/>
  <text x="40" y="514" font-size="11" fill="#9a9aa8">Dotted arrows: the foundation governs each test, and every closed door (a failed probe, a<tspan x="40" dy="16">named limit) maps a new edge back into the foundation.</tspan></text>
</svg>
